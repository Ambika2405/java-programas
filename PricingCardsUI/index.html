<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Cards UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Basic Plan -->
        <div class="card">
            <h2>Basic</h2>
            <p class="price">₹199</p>
            <ul>
                <li>✔ 1 User</li>
                <li>✔ Basic Support</li>
                <li>✔ Limited Access</li>
            </ul>
            <button>Choose Plan</button>
        </div>

        <!-- Standard Plan (Highlighted) -->
        <div class="card featured">
            <h2>Standard</h2>
            <p class="price">₹499</p>
            <ul>
                <li>✔ 5 Users</li>
                <li>✔ Priority Support</li>
                <li>✔ Full Access</li>
            </ul>
            <button>Choose Plan</button>
        </div>

        <!-- Premium Plan -->
        <div class="card">
            <h2>Premium</h2>
            <p class="price">₹999</p>
            <ul>
                <li>✔ Unlimited Users</li>
                <li>✔ 24/7 Support</li>
                <li>✔ All Features</li>
            </ul>
            <button>Choose Plan</button>
        </div>

    </div>

</body>
</html>
